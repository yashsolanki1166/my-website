<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xp.css@1.0.0/XP.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body {
            background: teal url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4"><rect fill="%23000080" width="4" height="4"/></svg>');
            font-family: "MS Sans Serif", Arial, sans-serif;
            font-size: 11px;
            color: #000;
        }

        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to right, #000080, #1084d7);
            padding: 2px;
            display: flex;
            gap: 5px;
            align-items: center;
            z-index: 1000;
            border-top: 2px solid;
            border-top-color: #dfdfdf #808080;
            min-height: 28px;
        }

        .start-button {
            background: linear-gradient(to right, #c0c0c0, #dfdfdf);
            border: 2px solid;
            border-color: #dfdfdf #808080 #808080 #dfdfdf;
            padding: 2px 6px;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            font-family: "MS Sans Serif", Arial, sans-serif;
        }

        .start-button:active {
            border-color: #808080 #dfdfdf #dfdfdf #808080;
        }

        .nav-container {
            display: flex;
            gap: 10px;
            flex: 1;
            margin-left: 10px;
        }

        .window {
            background: linear-gradient(to right, #000080, #1084d7);
            border: 2px solid;
            border-color: #dfdfdf #808080 #808080 #dfdfdf;
            margin: 20px auto;
            max-width: 700px;
            width: calc(100% - 40px);
            margin-bottom: 80px;
            box-shadow: 1px 1px 0 #ffffff, -1px -1px 0 #404040;
        }

        .title-bar {
            background: linear-gradient(to right, #000080, #1084d7);
            color: #ffffff;
            padding: 2px 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 11px;
            font-family: "MS Sans Serif", Arial, sans-serif;
        }

        .title-bar-controls {
            display: flex;
            gap: 2px;
        }

        .title-bar-button {
            background: linear-gradient(to bottom, #c0c0c0, #dfdfdf);
            border: 2px solid;
            border-color: #dfdfdf #808080 #808080 #dfdfdf;
            width: 16px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            color: #000;
            font-weight: bold;
        }

        .title-bar-button:active {
            border-color: #808080 #dfdfdf #dfdfdf #808080;
        }

        .window-content {
            background: #c0c0c0;
            padding: 20px;
            border: 1px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
        }

        .window h1 {
            font-size: 14px;
            color: #000080;
            margin: 10px 0;
            text-align: center;
            font-weight: bold;
            text-shadow: 1px 1px 0 #ffffff;
        }

        .window p {
            font-size: 11px;
            margin: 10px 0;
            line-height: 1.6;
            color: #000;
            text-align: center;
        }

        .desktop {
            padding: 10px;
            min-height: calc(100vh - 40px);
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .nav-links a {
            background: linear-gradient(to bottom, #c0c0c0, #dfdfdf);
            border: 2px solid;
            border-color: #dfdfdf #808080 #808080 #dfdfdf;
            padding: 4px 12px;
            text-decoration: none;
            color: #000;
            font-family: "MS Sans Serif", Arial, sans-serif;
            font-size: 11px;
            cursor: pointer;
            display: inline-block;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .nav-links a:active {
            border-color: #808080 #dfdfdf #dfdfdf #808080;
        }

        .contact-links {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin: 20px 0;
        }

        .contact-links a {
            background: linear-gradient(to bottom, #c0c0c0, #dfdfdf);
            border: 2px solid;
            border-color: #dfdfdf #808080 #808080 #dfdfdf;
            padding: 6px 14px;
            text-decoration: none;
            color: #000;
            font-family: "MS Sans Serif", Arial, sans-serif;
            font-size: 11px;
            cursor: pointer;
            display: inline-block;
            min-width: 200px;
            text-align: center;
        }

        .contact-links a:hover {
            text-decoration: underline;
        }

        .contact-links a:active {
            border-color: #808080 #dfdfdf #dfdfdf #808080;
        }
    </style>
</head>
<body>
    <div class="desktop">
        <div class="window animate__animated animate__fadeIn">
            <div class="title-bar">
                <span>Contact Info.txt</span>
                <div class="title-bar-controls">
                    <div class="title-bar-button">_</div>
                    <div class="title-bar-button">□</div>
                    <div class="title-bar-button">✕</div>
                </div>
            </div>
            <div class="window-content">
                <h1 class="animate__animated animate__fadeIn">
                    Get in Touch!
                </h1>

                <p class="animate__animated animate__fadeIn">
                    Feel free to connect with me on any of these platforms:
                </p>

                <div class="contact-links">
                    <a class="animate__animated animate__backInLeft" href="https://www.linkedin.com/in/yash-solanki-505558320?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app " target="_blank">
                        🔗 LinkedIn
                    </a>
                    <a class="animate__animated animate__fadeInRight" href="mailto:24110349@iitgn.ac.in">
                        📧 Email
                    </a>
                    <a class="animate__animated animate__backInLeft" href="https://github.com/yashsolanki1166" target="_blank">
                        🐙 Github
                    </a>
                    <a class="animate__animated animate__fadeInRight" href="https://www.instagram.com/yash__.solanki/" target="_blank">
                        📸 Instagram
                    </a>
                </div>

                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="about.html">About Me</a>
                    <a href="project.html">Projects</a>
                    <a href="contacts.html">Contact</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Taskbar -->
    <div class="taskbar">
        <button class="start-button">Start</button>
        <div class="nav-container">
            <a style="background: linear-gradient(to bottom, #c0c0c0, #dfdfdf); border: 2px solid; border-color: #dfdfdf #808080 #808080 #dfdfdf; padding: 2px 6px; text-decoration: none; color: #000; font-family: 'MS Sans Serif', Arial, sans-serif; font-size: 11px; display: inline-block; border-color: #808080 #dfdfdf #dfdfdf #808080;" href="index.html">Home</a>
            <a style="background: linear-gradient(to bottom, #c0c0c0, #dfdfdf); border: 2px solid; border-color: #dfdfdf #808080 #808080 #dfdfdf; padding: 2px 6px; text-decoration: none; color: #000; font-family: 'MS Sans Serif', Arial, sans-serif; font-size: 11px; display: inline-block;" href="about.html">About</a>
            <a style="background: linear-gradient(to bottom, #c0c0c0, #dfdfdf); border: 2px solid; border-color: #dfdfdf #808080 #808080 #dfdfdf; padding: 2px 6px; text-decoration: none; color: #000; font-family: 'MS Sans Serif', Arial, sans-serif; font-size: 11px; display: inline-block;" href="project.html">Projects</a>
            <a style="background: linear-gradient(to bottom, #c0c0c0, #dfdfdf); border: 2px solid; border-color: #dfdfdf #808080 #808080 #dfdfdf; padding: 2px 6px; text-decoration: none; color: #000; font-family: 'MS Sans Serif', Arial, sans-serif; font-size: 11px; display: inline-block;" href="contacts.html">Contact</a>
        </div>
    </div>
</body>
</html>
